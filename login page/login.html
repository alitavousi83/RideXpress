<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RideXpress</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <main class="auth-page">
    <div class="auth-card card" role="region" aria-label="Sign in">

      <!-- ============ Brand header ============ -->
      <header class="auth-header">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <!-- Car icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11" />
              <path d="M3 11h18v5a1 1 0 0 1-1 1h-1a2 2 0 1 1-4 0H9a2 2 0 1 1-4 0H4a1 1 0 0 1-1-1v-5z" />
            </svg>
          </span>
          <span class="brand-name">RideXpress</span>
        </div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue your journey</p>
      </header>

      <!-- ============ Driver / Passenger selector ============ -->
      <div class="role-switch" role="tablist" aria-label="Account type">
        <button type="button" id="role-passenger" class="role-option is-active"
                role="tab" aria-selected="true" data-role="passenger">
          <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="7" r="4" />
            <path d="M5.5 21a6.5 6.5 0 0 1 13 0" />
          </svg>
          Passenger
        </button>
        <button type="button" id="role-driver" class="role-option"
                role="tab" aria-selected="false" data-role="driver">
          <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="9" />
            <circle cx="12" cy="12" r="2.5" />
            <path d="M12 14.5V21M4 10l5.7 1.5M20 10l-5.7 1.5" />
          </svg>
          Driver
        </button>
      </div>

      <!-- ============ Login form ============ -->
      <!-- novalidate: validation is handled in login.js so messages match the app style -->
      <form id="login-form" class="auth-form" novalidate>

        <!-- Banner for form-level success / error messages from authentication -->
        <div id="form-message" class="form-message" role="alert" hidden></div>

        <!-- Phone number -->
        <div class="form-field">
          <label class="form-label" for="phone">Phone Number</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.4 2.1L8.1 10a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.6 2z" />
              </svg>
            </span>
            <input class="form-input" type="tel" id="phone" name="phone"
                   inputmode="tel" autocomplete="tel"
                   placeholder="e.g. +1 555 123 4567"
                   aria-describedby="phone-error" />
          </div>
          <p class="field-error" id="phone-error" hidden></p>
        </div>

        <!-- Password -->
        <div class="form-field">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="11" width="16" height="10" rx="2" />
                <path d="M8 11V7a4 4 0 0 1 8 0v4" />
              </svg>
            </span>
            <input class="form-input has-trailing-btn" type="password" id="password" name="password"
                   autocomplete="current-password" placeholder="Enter your password"
                   aria-describedby="password-error" />
            <!-- Show / hide password toggle -->
            <button type="button" class="password-toggle" id="password-toggle"
                    aria-label="Show password" aria-pressed="false">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
                <path d="M17.9 17.9A10.9 10.9 0 0 1 12 20c-7 0-11-8-11-8a20.3 20.3 0 0 1 5.1-6M9.9 4.2A10.9 10.9 0 0 1 12 4c7 0 11 8 11 8a20.4 20.4 0 0 1-3.2 4.2" />
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2" />
                <path d="M1 1l22 22" />
              </svg>
            </button>
          </div>
          <p class="field-error" id="password-error" hidden></p>
        </div>

        <!-- Remember me + forgot password -->
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me" name="remember-me" />
            <span>Remember me</span>
          </label>
          <a class="form-link" href="forgot-password.html">Forgot Password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span class="btn-spinner" aria-hidden="true" hidden></span>
          <span class="btn-label">Sign In</span>
        </button>
      </form>

      <!-- ============ Secondary links ============ -->
      <footer class="auth-footer">
        <p>Don't have an account? <a class="form-link" href="register.html">Create New Account</a></p>
      </footer>

    </div>
  </main>

  <!-- Shared auth helpers first, then the page controller -->
  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
