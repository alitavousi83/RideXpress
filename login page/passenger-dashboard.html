<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passenger Dashboard — RideXpress</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <main class="dash-page">
    <div class="dash-card card">
      <h1 class="dash-title">Passenger Dashboard</h1>
      <p class="dash-greeting" id="greeting"></p>
      <p class="dash-note">Book a ride and track your trips from here.</p>
      <button type="button" class="btn btn-primary" id="logout-btn">Log Out</button>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    // Guard: only signed-in passengers may view this page.
    (function () {
      "use strict";
      var user = RideXpressAuth.requireRole("passenger");
      if (!user) return; // requireRole already redirected to login
      document.getElementById("greeting").textContent = "Welcome, " + user.name + "!";
      document.getElementById("logout-btn").addEventListener("click", RideXpressAuth.logout);
    })();
  </script>
</body>
</html>
